{% extends 'base.html' %}

{% block title %}Register - Shreeji Auto Services{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/logo1.png') }}"
         class="auth-logo"
         alt="Logo">

    <h2 class="auth-title">
      Create Account at <span>Shreeji</span>
    </h2>

    <p class="auth-subtitle">
      Register once and use your phone number to login
    </p>

    <form method="POST" action="/register" class="auth-form">
      <label class="form-label" for="regName">Full Name *</label>
      <input type="text" class="form-control auth-input" id="regName" name="name" placeholder="Rahul Patel" required>

      <!-- # CHANGED: Phone number is unique and becomes the primary login identifier. -->
      <label class="form-label" for="regPhone">Phone Number *</label>
      <input type="tel" class="form-control auth-input" id="regPhone" name="phone" placeholder="9876543210" required>

      <label class="form-label" for="regVehicle">Vehicle Number *</label>
      <input type="text" class="form-control auth-input" id="regVehicle" name="vehicle" placeholder="MH 04 XX 1234" required style="text-transform:uppercase;">

      <button type="submit" class="btn btn-primary w-100 auth-btn">
        Create My Account
      </button>
    </form>

    <a href="/login" class="auth-link">Already have account? Login →</a>
  </div>
</div>
{% endblock %}
