{% extends "base.html" %}

{% block title %}Book Service - Shreeji Auto Services{% endblock %}

{% block content %}
<section style="padding: 110px 5% 70px; background: linear-gradient(180deg, #f6f2ed 0%, #ffffff 100%); min-height: 100vh;">
  <div style="max-width: 760px; margin: 0 auto;">
    <div class="dash-card" style="padding:2rem;">
      <div class="section-header" style="margin-bottom:1.5rem;">
        <div>
          <h1 class="dash-title">Book Service</h1>
          <p class="dash-sub">Complete your booking directly with your logged-in customer details.</p>
        </div>
        <a href="/dashboard" class="dash-btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>

      <form method="POST" action="/book" class="dash-form">
        <input type="hidden" name="customer_id" value="{{ customer.id }}" />

        <div class="dash-form-row">
          <div class="dash-form-group">
            <label>Name</label>
            <input type="text" name="customer_name" value="{{ customer.name }}" readonly />
          </div>
          <div class="dash-form-group">
            <label>Phone</label>
            <input type="text" name="customer_phone" value="{{ customer.phone or session.get('phone', '') }}" readonly />
          </div>
        </div>

        <div class="dash-form-group">
          <label>Vehicle Number Plate</label>
          <input type="text" name="vehicle_number" placeholder="GJ01AB1234" required style="text-transform:uppercase;" />
        </div>

        <div class="dash-form-group">
          <label>Brand / Model</label>
          <input type="text" name="brand_model" placeholder="Honda Activa 6G" required />
        </div>

        <div class="dash-form-row">
          <div class="dash-form-group">
            <label>Service Type</label>
            <select name="service" required>
              <option value="">Select Service</option>
              <option value="Full Service">Full Service</option>
              <option value="Engine Work">Engine Work</option>
              <option value="Washing">Washing</option>
            </select>
          </div>
          <div class="dash-form-group">
            <label>Preferred Date</label>
            <select name="date" required>
              <option value="">Select Date</option>
              {% for slot in date_slots if slot.available > 0 %}
                <option value="{{ slot.date }}">{{ slot.label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <button type="submit" class="dash-btn-primary" data-loading-submit="true" data-loading-text="Sending Request...">
          <i class="fas fa-paper-plane"></i> Send Booking Request
        </button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
