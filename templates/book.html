{% extends "base.html" %}

{% block title %}Book Service - GaragePro{% endblock %}

{% block content %}
<section class="hero-section" style="background: linear-gradient(135deg, var(--bg-dark) 0%, rgba(162, 4, 5, 0.15) 100%); padding: 100px 0;">
    <div class="container position-relative">
        <div class="row align-items-center">
            <div class="col-lg-6">
                <div class="fade-in-up">
                    <h1 class="display-4 fw-bold mb-4">Book Your Service</h1>
                    <p class="lead mb-0">Fast. Easy. Reliable. Complete the form below to schedule your appointment.</p>
                </div>
            </div>
            <div class="col-lg-6 text-center">
                <div class="fade-in-up" style="animation-delay: 0.3s;">
                    <i class="fas fa-calendar-alt fa-7x text-white opacity-75"></i>
                </div>
            </div>
        </div> 
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card service-card text-center p-5 mx-auto" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(162,4,5,0.15); box-shadow: var(--shadow-lift);">
                    <i class="fas fa-id-badge fa-4x mb-4" style="color: var(--accent);"></i>
                    <h3 class="h2 fw-bold mb-4">Verify Customer ID</h3>
                    <p class="text-muted mb-4">Enter your Customer ID to proceed with booking.</p>
    <form method="POST" action="/verify-customer">
                        <div class="input-group input-group-lg mb-3">
                            <span class="input-group-text">
                                <i class="fas fa-id-badge" style="color: var(--accent);"></i>
                            </span>
                            <input type="text" class="form-control" name="customer_id" id="customerInput" placeholder="CUST1001 (e.g. CUST1001)" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-check me-2"></i>Verify ID & Continue
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
