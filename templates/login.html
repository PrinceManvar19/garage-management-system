{% extends 'base.html' %}

{% block title %}Login - Shreeji Auto Services{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/logo1.png') }}"
         class="auth-logo"
         alt="Logo">

    <h2 class="auth-title">
      Welcome Back to <span>Shreeji</span>
    </h2>

    <p class="auth-subtitle">
      Sign in with your phone number to continue to your dashboard
    </p>

    <form method="POST" action="/login" class="auth-form">
      <!-- # CHANGED: Login now uses one field for phone number or legacy Customer/Admin ID. -->
      <label class="form-label" for="loginIdentifier">Phone Number or Customer ID *</label>
      <input type="text" class="form-control auth-input" id="loginIdentifier" name="identifier" placeholder="9876543210 or CUST1001" required>

      <button type="submit" class="btn btn-primary w-100 auth-btn">
        Continue to Dashboard
      </button>
    </form>

    <p style="text-align:center;margin-top:1rem;font-size:0.9em;color:#666;">New customer? <a href="/register" style="color:#007bff;font-weight:500;">Create your account →</a></p>
  </div>
</div>
{% endblock %}
